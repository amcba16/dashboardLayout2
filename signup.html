<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signup</title>
    <link rel="stylesheet" href="css/signup.css">
</head>
<body>
    <section class="signup-container">
        <header class="signin-header">
            <img src="img/profile.jpg" alt="logo"/>
            <p>Create your account</p>
        </header>
        <section class="signup-form">
            <form>
                <div class="form-group">
                    <label for="full-name">Full name</label>
                    <input type="text" id="full-name" placeholder="Enter your full name"/>
                </div>
                <div class="form-group">
                    <label for="email">Email address</label>
                    <input type="email" id="email" placeholder="Enter the email"/>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="Enter the password"/>
                </div>
                <div class="form-group">
                    <label for="repeat-password">Repeat password</label>
                    <input type="password" id="repeat-password" placeholder="Repeat password"/>
                </div>
                <div class="agree">
                    <input type="checkbox" id="agree"/>
                    <label for="agree">I agree to the Terms and Conditions</label>
                </div>
                <input type="submit" value="Sign up" class="signup-button"/>
                <div class="already-account">
                    <p>Already have an account? <a href="login.html">Sign in</a></p>
                </div>
            </form>
        </section>
    </section>
</body>
</html>
